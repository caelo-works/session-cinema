name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    name: Logic tests + packaging battery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Pure-logic tests (node)
        run: bash tests/run.sh
      - name: Packaging battery
        run: bash tests/packaging.sh

  package:
    name: Package builds + reproducible
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the update package
        run: bash scripts/build-update-package.sh 0.0.0-ci
      - name: Zip is reproducible (same content -> same SHA-1)
        run: |
          name="$(ls dist/*.zip)"
          a="$(sha1sum "$name" | cut -d' ' -f1)"
          bash scripts/build-update-package.sh 0.0.0-ci
          b="$(sha1sum "$name" | cut -d' ' -f1)"
          echo "build #1: $a"; echo "build #2: $b"
          [ "$a" = "$b" ] || { echo "::error::the package zip is not reproducible"; exit 1; }
