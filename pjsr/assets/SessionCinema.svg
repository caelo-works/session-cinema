<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Session Cinema">
  <!-- Session Cinema : le triangle de lecture, silhouette universelle et lisible
       a 16 px. La barre de progression dit la video ; l'etincelle garde le
       registre astro. -->
  <defs>
    <linearGradient id="scTile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111c33"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="scPlay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#scTile)"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="13.25" fill="none" stroke="#334155" stroke-width="1.5"/>

  <!-- lecture -->
  <path d="M25 17.5 L48 31 L25 44.5 Z" fill="url(#scPlay)"
        stroke="url(#scPlay)" stroke-width="4" stroke-linejoin="round"/>

  <!-- l'etincelle : garde le registre astro. Une seule, assez grosse pour
       survivre a 16 px ; une seconde, plus petite, ne faisait que du bruit. -->
  <path d="M14 12.5 L15.5 16.3 L19.3 17.8 L15.5 19.3 L14 23.1 L12.5 19.3 L8.7 17.8 L12.5 16.3 Z"
        fill="#67e8f9" opacity="0.85"/>

  <!-- progression -->
  <rect x="13" y="52" width="38" height="4" rx="2" fill="#1e293b"/>
  <rect x="13" y="52" width="23" height="4" rx="2" fill="url(#scPlay)"/>
</svg>
